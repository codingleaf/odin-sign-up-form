<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Odin Sign Up</title>
  <link rel="icon" href="assets/images/odin-logo.png">
  
  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/index.css">
</head>
<body>
  <div class="bg-wrapper">
    <figure>
      <div class="logo-wrapper">
        <img src="assets/images/odin-logo.png" alt="logo" width="380" height="508">
        <h1>ODIN</h1>
      </div>
      <img src="assets/images/bg.jpg" alt="" width="1862" height="2792">
      <figcaption>
        Photo by 
        <a class="bg-link" target="_blank" href="https://unsplash.com/@haliewestphoto">Halie West</a> 
        on 
        <a class="bg-link" target="_blank" href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">Unsplash</a>
      </figcaption>
    </figure>
  </div>

  <main>
    <div class="content">
      <div class="hero">
        <p><strong>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.</strong></p>
        <p><strong>Sign up <em>now</em> to get started.</strong></p>
        <p><strong>You <em>know</em> you want to</strong></p>
      </div>

      <div class="signup-box">
        <h1>Let's do this!</p></h1>
        
        <div class="inputs">
          <form id="signup-form" action="#" method="post">
            <label>
              FIRST NAME
              <input name="first-name" type="text">
            </label>
            <label>
              LAST NAME
              <input name="last-name" type="text">
            </label>
            <label>
              EMAIL
              <input name="email" type="email">
            </label>
            <label>
              PHONE NUMBER
              <input name="phone-number" type="tel">
            </label>
            <label>
              PASSWORD
              <input name="password" type="password" minlength="6">
            </label>
            <label>
              CONFIRM PASSWORD
              <input name="confirm-password" type="password" minlength="6">
            </label>
          </form>
        </div>
      </div>
      
      <div class="signup-actions">
        <button type="submit" form="signup-form">Create Account</button>
        <p class="login">Already have an account? <a href="#">Log in</a></p>
      </div>
    </div>
  </main>
</body>
</html>
